<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Uffizio KRA Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body,html{font-family:'Inter',sans-serif;background:#0f1117;color:#e8eaf6;min-height:100vh}
button,input,select,textarea{font-family:inherit}
#sidebar{width:220px;min-height:100vh;background:#161820;border-right:1px solid #2a2d3e;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:10}
#main{margin-left:220px;display:flex;flex-direction:column;min-height:100vh}
.logo{padding:14px;border-bottom:1px solid #2a2d3e;display:flex;align-items:center;gap:9px}
.logo-sq{width:28px;height:28px;border-radius:7px;background:#534AB7;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;flex-shrink:0}
.logo-t{font-size:12px;font-weight:600;color:#e8eaf6}.logo-s{font-size:10px;color:#555870}
.snav{padding:10px 6px;flex:1}
.slbl{font-size:9px;font-weight:500;color:#555870;text-transform:uppercase;letter-spacing:.09em;padding:0 6px;margin:10px 0 4px}
.sbtn{display:flex;align-items:center;gap:7px;width:100%;padding:7px 8px;border:none;background:none;color:#8b8fa8;font-size:11px;border-radius:6px;cursor:pointer;text-align:left;transition:.15s}
.sbtn:hover{background:#1e2030;color:#e8eaf6}.sbtn.on{background:#1e2030;color:#534AB7;font-weight:500;box-shadow:inset 2px 0 0 #534AB7}
.sbtn svg{width:14px;height:14px;flex-shrink:0}
.mochip{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;border-radius:6px;cursor:pointer;margin-bottom:2px;font-size:11px;transition:.15s}
.mochip:hover{background:#1e2030}.mochip.on{background:#1e2030;color:#534AB7;font-weight:500}
.mochip-n{color:#8b8fa8}.mochip.on .mochip-n{color:#534AB7}
.mochip-c{font-size:9px;background:#2a2d3e;border-radius:8px;padding:1px 6px;color:#555870}
.mbrsec{padding:8px 6px;border-top:1px solid #2a2d3e}
.mbrrow{display:flex;align-items:center;gap:6px;padding:5px 4px;border-radius:6px;cursor:pointer;margin-bottom:1px;transition:.15s}
.mbrrow:hover{background:#1e2030}.mbrrow.on{background:#252840}
.mbrav{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;flex-shrink:0}
.mbrn{font-size:11px;color:#8b8fa8;flex:1}.mbrrow.on .mbrn{color:#534AB7}
.mbrsc{font-size:10px;color:#555870;font-family:'JetBrains Mono',monospace}
#topbar{height:50px;background:#161820;border-bottom:1px solid #2a2d3e;display:flex;align-items:center;padding:0 18px;gap:8px;flex-shrink:0;position:sticky;top:0;z-index:5}
.pgtitle{font-size:13px;font-weight:600;color:#e8eaf6;flex:1}
.pgsub{font-size:11px;color:#555870;font-weight:400;margin-left:4px}
.tbtn{display:inline-flex;align-items:center;gap:4px;padding:6px 13px;border-radius:7px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid #2a2d3e;background:transparent;color:#8b8fa8;transition:.15s}
.tbtn:hover{background:#1e2030;color:#e8eaf6}.tbtn svg{width:12px;height:12px}
.tbtn-p{background:#534AB7;border-color:#534AB7;color:#fff}.tbtn-p:hover{background:#3C3489;border-color:#3C3489}
.tbtn-g{border-color:rgba(46,204,113,.3);color:#2ecc71}.tbtn-g:hover{background:rgba(46,204,113,.08)}
.tbtn-s{border-color:rgba(79,195,247,.3);color:#4fc3f7}.tbtn-s:hover{background:rgba(79,195,247,.08)}
#banner{background:#1a1d2e;border-bottom:1px solid #2a2d3e;padding:9px 18px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.bn-mo{font-size:14px;font-weight:600;color:#e8eaf6;flex-shrink:0}
.bn-sep{width:1px;height:14px;background:#2a2d3e;flex-shrink:0}
.bn-stat{text-align:center;flex-shrink:0}
.bn-v{font-size:13px;font-weight:600;color:#e8eaf6}.bn-l{font-size:9px;color:#555870;text-transform:uppercase;letter-spacing:.05em;margin-top:1px}
.bn-pb{flex:1;max-width:150px}
.pb-track{height:4px;background:#2a2d3e;border-radius:2px;margin-top:5px;overflow:hidden}
.pb-bar{height:100%;border-radius:2px;background:#534AB7}
#content{padding:16px 18px;flex:1;overflow-y:auto}
.view{display:none}.view.on{display:block}
.gb{display:inline-block;font-size:9px;font-weight:600;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em}
.gE{background:rgba(46,204,113,.12);color:#2ecc71}.gM{background:rgba(79,195,247,.12);color:#4fc3f7}
.gN{background:rgba(246,173,85,.12);color:#f6ad55}.gP{background:rgba(231,76,60,.12);color:#e74c3c}.g0{background:#2a2d3e;color:#555870}
.tag{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:500;white-space:nowrap}
.tH{background:rgba(231,76,60,.1);color:#e74c3c}.tM{background:rgba(246,173,85,.1);color:#f6ad55}.tL{background:#2a2d3e;color:#8b8fa8}
.tDone{background:rgba(46,204,113,.1);color:#2ecc71}.tProg{background:rgba(79,195,247,.1);color:#4fc3f7}
.tVer{background:rgba(246,173,85,.1);color:#f6ad55}.tTodo{background:#2a2d3e;color:#555870}
.ovgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.ovcard{background:#161820;border:1px solid #2a2d3e;border-radius:11px;padding:13px;cursor:pointer;position:relative;overflow:hidden;transition:.2s}
.ovcard:hover{border-color:#3a3d55;transform:translateY(-1px)}.ovcard.on{border-color:#534AB7}
.ovstripe{position:absolute;top:0;left:0;right:0;height:2px}
.ovhead{display:flex;align-items:center;gap:8px;margin-top:4px;margin-bottom:10px}
.ovav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.ovname{font-size:13px;font-weight:600;color:#e8eaf6}.ovinfo{font-size:10px;color:#555870}
.ovsc{font-size:20px;font-weight:600;margin-left:auto}
.kbars{margin-top:8px;display:flex;flex-direction:column;gap:3px}
.kb{display:flex;align-items:center;gap:5px;font-size:9px}
.kbl{color:#555870;width:17px;text-align:right;flex-shrink:0}.kbt{flex:1;height:2px;background:#2a2d3e;border-radius:1px;overflow:hidden}
.kbf{height:100%;border-radius:1px}.kbv{color:#555870;width:18px;text-align:right}
.ctrl{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.selbox{background:#1a1d2e;border:1px solid #2a2d3e;border-radius:7px;padding:6px 9px;font-size:11px;color:#e8eaf6;outline:none;cursor:pointer}
.chip{padding:4px 11px;border-radius:20px;font-size:10px;font-weight:500;cursor:pointer;border:1px solid #2a2d3e;color:#8b8fa8;background:none}
.chip.on{background:#534AB7;border-color:#534AB7;color:#fff}
.tc{background:#161820;border:1px solid #2a2d3e;border-radius:10px;margin-bottom:6px;overflow:hidden;transition:.15s}
.tc:hover{border-color:#3a3d55}.tc.rated{border-color:rgba(46,204,113,.3)}
.tch{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;cursor:pointer;user-select:none}
.tcn{width:19px;height:19px;border-radius:4px;background:#1e2030;display:flex;align-items:center;justify-content:center;font-size:9px;color:#555870;flex-shrink:0;margin-top:1px;font-family:'JetBrains Mono',monospace}
.tctask{font-size:12px;font-weight:500;color:#e8eaf6;margin-bottom:4px;line-height:1.4}
.tcmeta{display:flex;gap:4px;flex-wrap:wrap}
.tcr{display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0}
.scpill{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;background:#1e2030;color:#8b8fa8;white-space:nowrap;font-family:'JetBrains Mono',monospace}
.scpill.has{background:rgba(46,204,113,.12);color:#2ecc71}
.kpp{border-top:1px solid #2a2d3e;padding:11px 12px}
.kpplbl{font-size:9px;font-weight:600;color:#555870;text-transform:uppercase;letter-spacing:.09em;margin-bottom:3px}
.kppsub{font-size:10px;color:#555870;margin-bottom:9px}
.kprow{display:grid;grid-template-columns:18px 1fr 230px 55px;gap:9px;align-items:start;background:#1a1d2e;border-radius:8px;padding:9px 11px;margin-bottom:4px}
.kin{font-size:9px;font-weight:600;text-align:center;margin-top:1px;color:#555870;font-family:'JetBrains Mono',monospace}
.kinm{font-size:11px;font-weight:500;color:#e8eaf6}.kind{font-size:9px;color:#555870;margin-top:2px;line-height:1.4}
.bands{display:flex;gap:2px;flex-wrap:wrap}
.bb{padding:2px 4px;border-radius:3px;font-size:8px;font-weight:600;cursor:pointer;border:1px solid #2a2d3e;background:none;color:#555870;font-family:'JetBrains Mono',monospace;transition:.1s}
.bb:hover{border-color:#534AB7;color:#534AB7}.bb.on{background:#534AB7;border-color:#534AB7;color:#fff}
.kiwt{font-size:10px;color:#555870;text-align:right;font-family:'JetBrains Mono',monospace}
.kiwt strong{display:block;font-size:12px;font-weight:600;color:#e8eaf6}
.kppfoot{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:1px solid #2a2d3e;font-size:11px;color:#8b8fa8}
.notebox{width:100%;background:#1a1d2e;border:1px solid #2a2d3e;border-radius:7px;padding:7px 10px;font-size:11px;color:#e8eaf6;resize:none;outline:none;margin-top:8px;font-family:'Inter',sans-serif}
.notebox:focus{border-color:#534AB7}.notebox::placeholder{color:#555870}
.sumcard{background:#161820;border:1px solid #2a2d3e;border-radius:11px;padding:15px;margin-bottom:10px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden}
.sumav{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
.sumsc{font-size:34px;font-weight:600;margin-left:auto}
.tblwrap{background:#161820;border:1px solid #2a2d3e;border-radius:11px;overflow:hidden;margin-bottom:10px}
.tblhd{padding:9px 12px;border-bottom:1px solid #2a2d3e;font-size:12px;font-weight:600;color:#e8eaf6}
table{width:100%;border-collapse:collapse}
th{font-size:9px;font-weight:600;color:#555870;padding:7px 10px;text-align:left;border-bottom:1px solid #2a2d3e;background:#1a1d2e;text-transform:uppercase;letter-spacing:.06em}
td{font-size:11px;color:#8b8fa8;padding:8px 10px;border-bottom:1px solid #2a2d3e;vertical-align:middle}
tr:last-child td{border-bottom:none}tr:hover td{background:rgba(255,255,255,.01)}
.ttlrow td{background:#1a1d2e;color:#e8eaf6;font-weight:600}
.gbar{height:3px;background:#2a2d3e;border-radius:2px;margin-top:3px;width:55px;overflow:hidden}
.gbarfill{height:100%;border-radius:2px}
.chgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.chcard{background:#161820;border:1px solid #2a2d3e;border-radius:11px;padding:14px}
.chttl{font-size:12px;font-weight:600;color:#e8eaf6;margin-bottom:12px}
#modalbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
#modalbg.open{display:flex}
.modal{background:#161820;border:1px solid #3a3d55;border-radius:13px;padding:20px;width:420px;max-width:95vw}
.modalttl{font-size:14px;font-weight:600;color:#e8eaf6;margin-bottom:14px}
.fg{margin-bottom:8px}.fg label{font-size:10px;font-weight:500;color:#555870;display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em}
.fg input,.fg select{width:100%;background:#1a1d2e;border:1px solid #2a2d3e;border-radius:7px;padding:7px 10px;font-size:12px;color:#e8eaf6;outline:none}
.fg input:focus,.fg select:focus{border-color:#534AB7}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.modalfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
#syncp{display:none;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;font-size:10px;border:1px solid}
#syncp.ok{display:inline-flex;border-color:rgba(46,204,113,.3);color:#2ecc71;background:rgba(46,204,113,.06)}
#syncp.err{display:inline-flex;border-color:rgba(231,76,60,.3);color:#e74c3c;background:rgba(231,76,60,.06)}
#syncp.loading{display:inline-flex;border-color:rgba(79,195,247,.3);color:#4fc3f7;background:rgba(79,195,247,.06)}
.sdot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.empty{text-align:center;padding:40px;color:#555870;font-size:12px}
</style>
</head>
<body>
<aside id="sidebar">
  <div class="logo">
    <div class="logo-sq">KRA</div>
    <div><div class="logo-t">Uffizio KRA</div><div class="logo-s">Design Team · FY 2026-27</div></div>
  </div>
  <div class="snav">
    <div class="slbl">Views</div>
    <button class="sbtn on" id="nb-ov"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>Month Overview</button>
    <button class="sbtn" id="nb-rate"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Rate KPIs</button>
    <button class="sbtn" id="nb-sum"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>KRA Summary</button>
    <button class="sbtn" id="nb-cmp"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Month Comparison</button>
    <div class="slbl">Select Month</div>
    <div id="mopicker"></div>
  </div>
  <div class="mbrsec">
    <div class="slbl" style="padding:0 4px;margin-bottom:6px">Members</div>
    <div id="mbrlist"></div>
  </div>
</aside>
<div id="main">
  <div id="topbar">
    <div class="pgtitle">KRA Dashboard <span class="pgsub" id="pgsub">/ Month Overview</span></div>
    <div id="syncp"><div class="sdot"></div><span id="synctxt"></span></div>
    <button class="tbtn tbtn-s" id="btn-sync"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>Sync Sheet</button>
    <button class="tbtn tbtn-g" id="btn-export"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export KRA</button>
    <button class="tbtn tbtn-p" id="btn-add"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Task</button>
  </div>
  <div id="banner"></div>
  <div id="content">
    <div class="view on" id="v-ov"><div class="ovgrid" id="ovgrid"></div></div>
    <div class="view" id="v-rate">
      <div class="ctrl">
        <select class="selbox" id="mdrop"><option>Harshil</option><option>Hinesh</option><option>Mansi</option><option>Vishal</option><option>Mayur</option><option>Kinjal</option></select>
        <button class="chip on" data-f="All">All</button>
        <button class="chip" data-f="Done">Done</button>
        <button class="chip" data-f="In Progress">In Progress</button>
        <button class="chip" data-f="Verification">Verification</button>
        <button class="chip" data-f="Todo">Todo</button>
        <span id="rinfo" style="margin-left:auto;font-size:10px;color:#555870"></span>
      </div>
      <div id="tasklist"></div>
    </div>
    <div class="view" id="v-sum">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
        <span style="font-size:13px;font-weight:600;color:#e8eaf6">KRA Summary — <span id="sumname" style="color:#534AB7">—</span></span>
        <select class="selbox" id="sumdrop"><option>Harshil</option><option>Hinesh</option><option>Mansi</option><option>Vishal</option><option>Mayur</option><option>Kinjal</option></select>
      </div>
      <div id="sumcontent"></div>
    </div>
    <div class="view" id="v-cmp">
      <div style="font-size:13px;font-weight:600;color:#e8eaf6;margin-bottom:12px">Month Comparison — FY 2026-27</div>
      <div class="chgrid">
        <div class="chcard"><div class="chttl">KRA Scores</div><div style="height:190px;position:relative"><canvas id="chart-bar"></canvas></div></div>
        <div class="chcard"><div class="chttl">KPI Radar</div><div style="height:190px;position:relative"><canvas id="chart-radar"></canvas></div></div>
      </div>
      <div class="tblwrap"><div class="tblhd">Score Matrix</div><div style="overflow-x:auto"><table id="cmptbl"></table></div></div>
    </div>
  </div>
</div>
<div id="modalbg">
  <div class="modal">
    <div class="modalttl">Add New Task</div>
    <div class="fg"><label>Task name *</label><input id="nt-name" placeholder="e.g. Homepage redesign"></div>
    <div class="fg2"><div class="fg"><label>Assignee</label><select id="nt-mbr"><option>Harshil</option><option>Hinesh</option><option>Mansi</option><option>Vishal</option><option>Mayur</option><option>Kinjal</option></select></div><div class="fg"><label>Priority</label><select id="nt-pri"><option>Medium</option><option>High</option><option>Low</option></select></div></div>
    <div class="fg2"><div class="fg"><label>Start date</label><input id="nt-start" type="date"></div><div class="fg"><label>Status</label><select id="nt-stat"><option>Todo</option><option>In Progress</option><option>Done</option><option>Verification</option></select></div></div>
    <div class="fg"><label>Jira ticket</label><input id="nt-jira" placeholder="NTRAK-12345"></div>
    <div class="modalfoot"><button class="tbtn" id="btn-cancel">Cancel</button><button class="tbtn tbtn-p" id="btn-save">Add Task</button></div>
  </div>
</div>
<script>
var SCRIPT_URL="https://script.google.com/macros/s/AKfycbyBoE34QVlVBUt3ks20Zivig3V6HyMrheZfo1frck2rzjCBy8epf1QkZNF6hnym94HA4A/exec";
var KPIs=[{id:1,name:"Self Cross Verifying",desc:"Output matches requirement, minimising rework",wt:12},{id:2,name:"Time Management",desc:"Timely submission, meeting deadlines consistently",wt:12},{id:3,name:"Creativity & Adaptability",desc:"New trends, creative & innovative approaches",wt:16},{id:4,name:"Design Quality",desc:"High-quality UI/UX, minimal feedback cycles",wt:12},{id:5,name:"Dedication & Behavior",desc:"Ownership, responsibility, positive attitude",wt:8},{id:6,name:"Initiative & Proactiveness",desc:"Suggests improvements, maintains brand",wt:8},{id:7,name:"AI Utilization",desc:"Effective AI tool use, prompt writing",wt:12},{id:8,name:"Attendance & Punctuality",desc:"Regular attendance, punctuality, shift adherence",wt:10},{id:9,name:"Process Compliance",desc:"HR policies, security, communication discipline",wt:5},{id:10,name:"Learning & Development",desc:"Training, skill development, certifications",wt:5}];
var BANDS=["0-9","10-19","20-29","30-39","40-49","50-59","60-69","70-79","80-89","90-99","100"];

  document.getElementById("nb-sum").addEventListener("click",function(){setView("sum");});
  document.getElementById("nb-cmp").addEventListener("click",function(){setView("cmp");});
  document.getElementById("btn-sync").addEventListener("click",syncSheet);
  document.getElementById("btn-export").addEventListener("click",exportCSV);
  document.getElementById("btn-add").addEventListener("click",openModal);
  document.getElementById("btn-cancel").addEventListener("click",closeModal);
  document.getElementById("btn-save").addEventListener("click",saveTask);
  document.getElementById("mdrop").addEventListener("change",function(){curMember=this.value;buildRate();buildMbrList();});
  document.getElementById("sumdrop").addEventListener("change",function(){curSumMember=this.value;buildSummary();});
  document.getElementById("modalbg").addEventListener("click",function(e){if(e.target===this)closeModal();});
  document.querySelectorAll("[data-f]").forEach(function(b){b.addEventListener("click",function(){curFilter=this.getAttribute("data-f");document.querySelectorAll("[data-f]").forEach(function(x){x.classList.remove("on");});this.classList.add("on");buildRate();});});
}
function setView(v){
  curView=v;
  document.querySelectorAll(".view").forEach(function(el){el.classList.remove("on");});
  document.getElementById("v-"+v).classList.add("on");
  document.querySelectorAll(".sbtn").forEach(function(el){el.classList.remove("on");});
  document.getElementById("nb-"+v).classList.add("on");
  var subs={ov:"/ Month Overview",rate:"/ Rate KPIs",sum:"/ KRA Summary",cmp:"/ Month Comparison"};
  document.getElementById("pgsub").textContent=subs[v]||"";
  buildView();buildMbrList();buildMoPicker();
}
function buildView(){if(curView==="ov")buildOverview();if(curView==="rate")buildRate();if(curView==="sum")buildSummary();if(curView==="cmp")buildCompare();}
function buildMoPicker(){
  var w=document.getElementById("mopicker");w.innerHTML="";
  var months=allMonths();
  if(months.length&&!months.find(function(p){return p[0]===curMonth;}))curMonth=months[0][0];
  months.forEach(function(pair){
    var m=pair[0],cnt=pair[1],div=document.createElement("div");
    div.className="mochip"+(curMonth===m?" on":"");
    div.innerHTML='<span class="mochip-n">'+mlabel(m)+'</span><span class="mochip-c">'+cnt+'</span>';
    div.addEventListener("click",function(){curMonth=m;buildMoPicker();buildBanner();buildMbrList();buildView();});
    w.appendChild(div);
  });
}
function buildBanner(){
  var mt=tasks.filter(function(t){return t.month===curMonth;});
  var rated=mt.filter(function(t){return tKra(t)!==null;}).length;
  var pct=mt.length?Math.round(rated/mt.length*100):0;
  var scs=MEMBERS.map(function(m){return mScore(m.id,curMonth);}).filter(function(s){return s!==null;});
  var avg=scs.length?Math.round(scs.reduce(function(a,b){return a+b;},0)/scs.length*10)/10:null;
  var ri=avg!==null?rInfo(avg):{l:"Not rated",c:"g0"};
  var cols={"gE":"#2ecc71","gM":"#4fc3f7","gN":"#f6ad55","gP":"#e74c3c","g0":"#555870"};
  document.getElementById("banner").innerHTML='<div class="bn-mo">'+mlabel(curMonth)+'</div><div class="bn-sep"></div><div class="bn-stat"><div class="bn-v">'+mt.length+'</div><div class="bn-l">Tasks</div></div><div class="bn-sep"></div><div class="bn-stat"><div class="bn-v">'+rated+'</div><div class="bn-l">KRA Rated</div></div><div class="bn-sep"></div><div class="bn-stat"><div class="bn-v" style="color:#534AB7">'+(avg!==null?avg:"—")+'</div><div class="bn-l">Avg Score</div></div><div class="bn-sep"></div><div class="bn-stat"><div class="bn-v" style="color:'+cols[ri.c]+';font-size:11px">'+ri.l+'</div><div class="bn-l">Team Grade</div></div><div class="bn-pb"><div style="display:flex;justify-content:space-between;font-size:9px;color:#555870"><span>Progress</span><span style="color:#534AB7">'+pct+'%</span></div><div class="pb-track"><div class="pb-bar" style="width:'+pct+'%"></div></div></div>';
}
function buildMbrList(){
  var w=document.getElementById("mbrlist");w.innerHTML="";
  MEMBERS.forEach(function(m){
    var sc=mScore(m.id,curMonth),div=document.createElement("div");
    div.className="mbrrow"+(curMember===m.id?" on":"");
    div.innerHTML='<div class="mbrav" style="background:'+m.bg+';color:'+m.c+'">'+m.av+'</div><span class="mbrn">'+m.id+'</span><span class="mbrsc">'+(sc!==null?sc.toFixed(1):"—")+'</span>';
    div.addEventListener("click",function(){curMember=m.id;document.getElementById("mdrop").value=m.id;setView("rate");});

}
function buildOverview(){
  var g=document.getElementById("ovgrid");g.innerHTML="";
  MEMBERS.forEach(function(m){
    var mt=tasks.filter(function(t){return t.assignee===m.id&&t.month===curMonth;});
    var rc=mt.filter(function(t){return tKra(t)!==null;}).length;
    var sc=mScore(m.id,curMonth),avgs=mKpiAvg(m.id,curMonth),ri=rInfo(sc);
    var kbars="";KPIs.forEach(function(k,i){var v=avgs[i];kbars+='<div class="kb"><span class="kbl">K'+k.id+'</span><div class="kbt"><div class="kbf" style="width:'+(v||0)+'%;background:'+KC[i]+'"></div></div><span class="kbv">'+(v||"—")+'</span></div>';});
    var card=document.createElement("div");card.className="ovcard"+(curMember===m.id?" on":"");
    card.innerHTML='<div class="ovstripe" style="background:'+m.bc+'"></div><div class="ovhead"><div class="ovav" style="background:'+m.bg+';color:'+m.c+'">'+m.av+'</div><div><div class="ovname">'+m.id+'</div><div class="ovinfo">'+mt.length+' tasks · '+rc+' rated</div></div><div class="ovsc" style="color:'+m.bc+'">'+(sc!==null?sc.toFixed(1):"—")+'</div></div><span class="gb '+ri.c+'">'+ri.l+'</span><div class="kbars">'+kbars+'</div><div style="font-size:10px;color:#555870;margin-top:6px">Click to rate →</div>';
    card.addEventListener("click",function(){curMember=m.id;document.getElementById("mdrop").value=m.id;setView("rate");});

  });
}
function buildRate(){
  document.getElementById("mdrop").value=curMember;
  var all=tasks.filter(function(t){return t.assignee===curMember&&t.month===curMonth;});
  var total=all.length,rated=all.filter(function(t){return tKra(t)!==null;}).length;
  var mt=curFilter==="All"?all:all.filter(function(t){return t.status===curFilter;});
  document.getElementById("rinfo").textContent=mlabel(curMonth)+" · "+total+" tasks · "+rated+" rated";
  var w=document.getElementById("tasklist");
  if(!mt.length){w.innerHTML='<div class="empty">No tasks for '+curMember+' in '+mlabel(curMonth)+(curFilter!=="All"?" · "+curFilter:"")+'</div>';return;}
  w.innerHTML="";
  mt.forEach(function(task,idx){
    var sc=tKra(task),isOpen=openId===task.id,full=Object.keys(task.ratings||{}).length===10,ri=rInfo(sc);
    var el=document.createElement("div");el.className="tc"+(full?" rated":"");el.id="tc-"+task.id;
    el.innerHTML='<div class="tch" data-tid="'+task.id+'"><div class="tcn">'+(idx+1)+'</div><div style="flex:1"><div class="tctask">'+task.task+'</div><div class="tcmeta">'+ptag(task.priority)+stag(task.status)+(task.start?'<span class="tag tTodo" style="font-size:9px">'+task.start+'</span>':'')+(task.jira?'<span class="tag" style="background:rgba(79,195,247,.1);color:#4fc3f7;font-size:8px">'+task.jira+'</span>':'')+'</div></div><div class="tcr"><span class="gb '+ri.c+'">'+ri.l+'</span><span class="scpill'+(sc!==null?" has":")")+'">'+(sc!==null?sc.toFixed(1)+"/100":"Rate KPIs")+'</span><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#555870" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></div></div>';
    if(isOpen)el.appendChild(buildKpiPanel(task));
    el.querySelector(".tch").addEventListener("click",function(){var tid=parseInt(this.getAttribute("data-tid"));openId=openId===tid?null:tid;buildRate();});
    w.appendChild(el);
  });
}
function buildKpiPanel(task){
  var panel=document.createElement("div");panel.className="kpp";
  var h='<div class="kpplbl">Rate all 10 KPIs</div><div class="kppsub">Select a score band for each KPI — auto-converts to weighted points</div>';
  KPIs.forEach(function(k,i){
    var cur=(task.ratings||{})[k.id]||"";
    var gained=cur?bGained(cur,k.wt):0;
    var bbtns=BANDS.map(function(b){return'<button class="bb'+(cur===b?" on":"")+'" data-tid="'+task.id+'" data-kpi="'+k.id+'" data-b="'+b+'">'+b+'</button>';}).join("");
    h+='<div class="kprow"><div class="kin" style="color:'+KC[i]+'">'+k.id+'</div><div><div class="kinm">'+k.name+'</div><div class="kind">'+k.desc+'</div></div><div class="bands">'+bbtns+'</div><div class="kiwt"><strong>'+k.wt+'</strong>pts'+(cur?'<br><span style="color:#2ecc71;font-size:10px">+'+gained+'</span>':'')+'</div></div>';
  });
  var sc=tKra(task),done=Object.keys(task.ratings||{}).length,ri=rInfo(sc);
  h+='<textarea class="notebox" rows="2" placeholder="Team lead comment…" data-tid="'+task.id+'">'+(task.note||"")+'</textarea>';
  h+='<div class="kppfoot"><span>'+done+'/10 KPIs · Score: <strong style="font-size:13px;color:'+(sc!==null?"#2ecc71":"#555870")+'">'+(sc!==null?sc.toFixed(1):"—")+'</strong>/100 · <span class="gb '+ri.c+'">'+ri.l+'</span></span>'+(done===10?'<span class="gb gE">✓ Done</span>':'<span style="font-size:10px;color:#555870">Rate all 10</span>')+'</div>';
  panel.innerHTML=h;
  panel.querySelectorAll(".bb").forEach(function(btn){
    btn.addEventListener("click",function(e){
      e.stopPropagation();
      var t=tasks.find(function(x){return x.id===parseInt(this.getAttribute("data-tid"));}.bind(this));
      if(!t)return;if(!t.ratings)t.ratings={};t.ratings[parseInt(this.getAttribute("data-kpi"))]=this.getAttribute("data-b");
      saveLocal();
      if(SCRIPT_URL){var pl={action:"saveRatings",rowId:t.id,score:tKra(t)||0,note:t.note||"",assignee:t.assignee,task:t.task,month:t.month};KPIs.forEach(function(k){pl["r"+k.id]=t.ratings[k.id]||"";});fetch(SCRIPT_URL,{method:"POST",mode:"cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(pl)}).catch(function(){});}
      var card=document.getElementById("tc-"+t.id);
      if(card){var op=card.querySelector(".kpp");if(op)op.remove();card.appendChild(buildKpiPanel(t));var pill=card.querySelector(".scpill");var nsc=tKra(t);if(pill){pill.textContent=nsc!==null?nsc.toFixed(1)+"/100":"Rate KPIs";pill.className="scpill"+(nsc!==null?" has":"");}if(Object.keys(t.ratings||{}).length===10)card.classList.add("rated");}
      buildBanner();buildMbrList();
    });
  });
  var ta=panel.querySelector(".notebox");
  if(ta)ta.addEventListener("change",function(){var t=tasks.find(function(x){return x.id===parseInt(ta.getAttribute("data-tid"));});if(t){t.note=ta.value;saveLocal();}});
  return panel;
}
function buildSummary(){
  var cs=document.getElementById("sumdrop").value;curSumMember=cs;
  document.getElementById("sumname").textContent=curSumMember+" · "+mlabel(curMonth);
  var M=gm(curSumMember),sc=mScore(curSumMember,curMonth),ri=rInfo(sc);
  var mt=tasks.filter(function(t){return t.assignee===curSumMember&&t.month===curMonth;});
  var rt=mt.filter(function(t){return tKra(t)!==null;});
  var avgs=mKpiAvg(curSumMember,curMonth);
  var kRows=KPIs.map(function(k,i){var avg=avgs[i];var gained=avg!==null?Math.round(avg/100*k.wt*100)/100:null;return'<tr><td style="color:#555870">'+k.id+'</td><td><strong style="color:#e8eaf6">'+k.name+'</strong><div style="font-size:9px;color:#555870;margin-top:1px">'+k.desc+'</div></td><td style="font-weight:600;color:#e8eaf6">'+k.wt+'</td><td>'+(avg!==null?'<span style="font-weight:600;color:#e8eaf6">'+avg+'</span><span style="color:#555870">/100</span><div class="gbar"><div class="gbarfill" style="width:'+avg+'%;background:'+KC[i]+'"></div></div>':'<span style="color:#555870">—</span>')+'</td><td style="font-weight:600;color:'+(gained!==null?"#2ecc71":"#555870")+'">'+(gained!==null?gained:"—")+'/'+k.wt+'</td></tr>';}).join("");
  var tRows=mt.map(function(t,i){var sc2=tKra(t),done=Object.keys(t.ratings||{}).length,ri2=rInfo(sc2);return'<tr><td style="color:#555870">'+(i+1)+'</td><td style="max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#e8eaf6">'+t.task+'</td><td>'+stag(t.status)+'</td><td style="color:'+(done===10?"#2ecc71":"#f6ad55")+'">'+done+'/10</td><td style="font-weight:600;color:'+(sc2!==null?"#2ecc71":"#555870")+'">'+(sc2!==null?sc2.toFixed(1):"—")+'</td><td><span class="gb '+ri2.c+'">'+ri2.l+'</span></td></tr>';}).join("");
  document.getElementById("sumcontent").innerHTML='<div class="sumcard"><div style="position:absolute;top:0;left:0;right:0;height:2px;background:'+M.bc+'"></div><div class="sumav" style="background:'+M.bg+';color:'+M.c+'">'+M.av+'</div><div><div style="font-size:15px;font-weight:600;color:#e8eaf6">'+curSumMember+'</div><div style="font-size:11px;color:#555870;margin-top:3px">'+mlabel(curMonth)+' · '+mt.length+' tasks · '+rt.length+' rated</div><span class="gb '+ri.c+'" style="margin-top:8px;display:inline-block">'+ri.l+'</span></div><div style="margin-left:auto;text-align:right"><div class="sumsc" style="color:'+M.bc+'">'+(sc!==null?sc.toFixed(1):"—")+'</div><div style="font-size:11px;color:#555870">/ 100</div></div></div><div class="tblwrap"><table><thead><tr><th>#</th><th>KPI</th><th>Weight</th><th>Avg Score</th><th>Gained</th></tr></thead><tbody>'+kRows+'<tr class="ttlrow"><td colspan="2">Total KRA — '+mlabel(curMonth)+'</td><td>100</td><td><span class="gb '+ri.c+'">'+ri.l+'</span></td><td style="font-weight:700;font-size:14px;color:'+(sc!==null?"#2ecc71":"#555870")+'">'+(sc!==null?sc.toFixed(1):"—")+'/100</td></tr></tbody></table></div><div class="tblwrap"><div class="tblhd">Task scores — '+mlabel(curMonth)+'</div><table><thead><tr><th>#</th><th>Task</th><th>Status</th><th>KPIs</th><th>Score</th><th>Grade</th></tr></thead><tbody>'+tRows+'</tbody></table></div>';
}
function buildCompare(){
  var months=allMonths().map(function(p){return p[0];});
  if(charts.bar){charts.bar.destroy();charts.bar=null;}
  if(charts.radar){charts.radar.destroy();charts.radar=null;}
  charts.bar=new Chart(document.getElementById("chart-bar"),{type:"bar",data:{labels:MEMBERS.map(function(m){return m.id;}),datasets:months.map(function(mo){return{label:mlabel(mo),data:MEMBERS.map(function(m){return mScore(m.id,mo)||0;}),backgroundColor:MEMBERS.map(function(m){return m.bc+"44";}),borderColor:MEMBERS.map(function(m){return m.bc;}),borderWidth:2,borderRadius:5};})},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#8b8fa8",font:{size:10}}}},scales:{x:{grid:{color:"rgba(255,255,255,.04)"},ticks:{color:"#8b8fa8",font:{size:10}}},y:{grid:{color:"rgba(255,255,255,.04)"},ticks:{color:"#8b8fa8",font:{size:10}},min:0,max:100}}}});
  var ta=KPIs.map(function(k,i){var vs=MEMBERS.map(function(m){return mKpiAvg(m.id,curMonth)[i];}).filter(function(v){return v!==null&&v>0;});return vs.length?Math.round(vs.reduce(function(a,b){return a+b;},0)/vs.length):0;});
  charts.radar=new Chart(document.getElementById("chart-radar"),{type:"radar",data:{labels:KPIs.map(function(k){return"K"+k.id+"("+k.wt+"pt)";}),datasets:[{label:"Team avg",data:ta,backgroundColor:"rgba(83,74,183,.15)",borderColor:"#534AB7",borderWidth:2,pointBackgroundColor:"#534AB7",pointRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{r:{grid:{color:"rgba(255,255,255,.07)"},ticks:{display:false},pointLabels:{color:"#8b8fa8",font:{size:9}},min:0,max:100}}}});
  var tbl=document.getElementById("cmptbl");
  var h="<thead><tr><th>Member</th>"+months.map(function(m){return"<th>"+mlabel(m)+"</th>";}).join("")+"<th>Best Month</th></tr></thead><tbody>";
  MEMBERS.forEach(function(m){var scs=months.map(function(mo){return mScore(m.id,mo);});var valid=scs.filter(function(s){return s!==null;});var best=valid.length?Math.max.apply(null,valid):null;var bi=best!==null?scs.indexOf(best):-1;var M=gm(m.id);h+="<tr><td><div style='display:flex;align-items:center;gap:6px'><div class='mbrav' style='width:20px;height:20px;font-size:9px;background:"+M.bg+";color:"+M.c+"'>"+M.av+"</div>"+m.id+"</div></td>";scs.forEach(function(sc){var ri=rInfo(sc);h+="<td>"+(sc!==null?"<strong style='color:"+M.bc+"'>"+sc.toFixed(1)+"</strong><br><span class='gb "+ri.c+"' style='font-size:8px'>"+ri.l+"</span>":"<span style='color:#555870'>—</span>")+"</td>";});h+="<td style='color:#f6ad55;font-weight:600'>"+(best!==null?mlabel(months[bi]):"—")+"</td></tr>";});
  tbl.innerHTML=h+"</tbody>";
}
function showSync(state,msg){var el=document.getElementById("syncp");el.className=state;document.getElementById("synctxt").textContent=msg;if(state!=="loading")setTimeout(function(){el.className="";},5000);}
function syncSheet(){
  if(!SCRIPT_URL){showSync("err","No Sheet URL");return;}
  showSync("loading","Syncing from Google Sheet…");
  var cb="kra_cb_"+Date.now(),script=document.createElement("script");
  script.src=SCRIPT_URL+"?action=getTasks&callback="+cb+"&t="+Date.now();
  window[cb]=function(data){
    delete window[cb];if(script.parentNode)script.parentNode.removeChild(script);
    if(data.error){showSync("err","Error: "+data.error);return;}
    if(!data.tasks||!data.tasks.length){showSync("err","No tasks returned");return;}
    data.tasks.forEach(function(st){var ex=tasks.find(function(t){return t.id===st.id;});st.ratings=(ex&&Object.keys(ex.ratings||{}).length>0)?ex.ratings:(st.ratings||{});st.note=(ex&&ex.note)?ex.note:(st.note||"");});
    tasks.forEach(function(lt){if(!data.tasks.find(function(t){return t.id===lt.id;}))data.tasks.push(lt);});
    tasks=data.tasks;nextId=Math.max.apply(null,tasks.map(function(t){return t.id;}))+1;
    saveLocal();renderAll();
    showSync("ok","✓ Synced "+tasks.length+" tasks from Google Sheet");
  };
  script.onerror=function(){delete window[cb];if(script.parentNode)script.parentNode.removeChild(script);showSync("err","Sync failed — check Apps Script deployment");};
  document.head.appendChild(script);
  setTimeout(function(){if(window[cb]){delete window[cb];showSync("err","Timeout — check Apps Script");}},12000);
}
function openModal(){document.getElementById("nt-mbr").value=curMember;document.getElementById("modalbg").classList.add("open");}
function closeModal(){document.getElementById("modalbg").classList.remove("open");}
function saveTask(){
  var name=document.getElementById("nt-name").value.trim();if(!name){alert("Enter task name.");return;}
  var start=document.getElementById("nt-start").value,month=start?start.substring(0,7):curMonth;
  var t={id:nextId++,task:name,assignee:document.getElementById("nt-mbr").value,priority:document.getElementById("nt-pri").value,start:start,end:"",jira:document.getElementById("nt-jira").value.trim(),status:document.getElementById("nt-stat").value,month:month,ratings:{},note:""};
  tasks.push(t);saveLocal();
  if(SCRIPT_URL)fetch(SCRIPT_URL,{method:"POST",mode:"cors",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"addTask",task:t.task,assignee:t.assignee,priority:t.priority,start:t.start,end:t.end,jira:t.jira,status:t.status})}).catch(function(){});
  closeModal();["nt-name","nt-start","nt-jira"].forEach(function(id){document.getElementById(id).value="";});
  curMember=t.assignee;curMonth=month;renderAll();setView("rate");
}
function exportCSV(){
  var months=allMonths().map(function(p){return p[0];});
  var rows=["Member,Month,Task,Status,Jira,Priority,"+KPIs.map(function(k){return"KPI"+k.id+"_Band";}).join(",")+","+KPIs.map(function(k){return"KPI"+k.id+"_Gained";}).join(",")+",Total_Score,Grade"];
  tasks.forEach(function(t){var sc=tKra(t),ri=rInfo(sc);rows.push(['"'+t.assignee+'"','"'+mlabel(t.month)+'"','"'+t.task.replace(/"/g,'""')+'"','"'+t.status+'"','"'+(t.jira||"")+'"','"'+t.priority+'"'].concat(KPIs.map(function(k){return t.ratings&&t.ratings[k.id]?t.ratings[k.id]:""})).concat(KPIs.map(function(k){return t.ratings&&t.ratings[k.id]?bGained(t.ratings[k.id],k.wt):""})).concat([sc!==null?sc:"",'"'+ri.l+'"']).join(","));});
  rows.push("","KRA SUMMARY","Member,Month,"+KPIs.map(function(k){return k.name+"_Avg";}).join(",")+",KRA_Score,Grade");
  MEMBERS.forEach(function(m){months.forEach(function(mo){var avgs=mKpiAvg(m.id,mo),sc=mScore(m.id,mo),ri=rInfo(sc);rows.push(['"'+m.id+'"','"'+mlabel(mo)+'"'].concat(avgs.map(function(v){return v!==null?v:"";})).concat([sc!==null?sc:"",'"'+ri.l+'"']).join(","));});});
  var blob=new Blob([rows.join("\n")],{type:"text/csv"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="KRA_"+new Date().toISOString().slice(0,7)+".csv";a.click();URL.revokeObjectURL(a.href);
}
window.addEventListener("DOMContentLoaded",function(){init();});
